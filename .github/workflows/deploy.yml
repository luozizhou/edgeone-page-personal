name: Deploy to Tencent COS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Configure Tencent Cloud CLI
        run: |
          pip install tccli
          tccli configure set --secret-id ${{ secrets.TENCENT_SECRET_ID }} --secret-key ${{ secrets.TENCENT_SECRET_KEY }} --region ap-guangzhou

      - name: Upload to COS
        run: |
          # TODO: 替换为你的实际 COS Bucket 名称 (格式: xxx-123456789)
          BUCKET_NAME=${{ secrets.COS_BUCKET_NAME }}
          tccli cos upload --bucket ${BUCKET_NAME} --key "" --local-path ./out --region ap-guangzhou --recursive